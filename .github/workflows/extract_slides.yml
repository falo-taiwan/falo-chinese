name: Extract Slides from YouTube
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
      task_id:
        description: 'Task ID'
        required: true
      cloudflare_url:
        description: 'Cloudflare Worker URL'
        required: true
      token_hint:
        description: 'Token Hint for billing track'
        required: false
        default: ''
      json_only:
        description: 'Only generate JSON timeline (skip images and PDF/PPTX/HTML)'
        required: false
        default: 'false'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools & Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install "yt-dlp[default]" opencv-python-headless requests python-pptx pillow

      - name: Create cookies.txt
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        if: "${{ env.YT_COOKIES != '' }}"
        run: |
          python -c "import os; open('cookies.txt', 'w', encoding='utf-8').write(os.environ['YT_COOKIES'])"

      - name: Run Slide Extractor
        run: |
          COOKIE_ARG=""
          if [ -f cookies.txt ]; then
            COOKIE_ARG="--cookies cookies.txt"
          fi
          JSON_ONLY_ARG=""
          if [ "${{ github.event.inputs.json_only }}" = "true" ]; then
            JSON_ONLY_ARG="--json-only"
          fi
          python run_extractor.py \
            --url "${{ github.event.inputs.video_url }}" \
            --task-id "${{ github.event.inputs.task_id }}" \
            --cloudflare-url "${{ github.event.inputs.cloudflare_url }}" \
            --token-hint "${{ github.event.inputs.token_hint }}" \
            $COOKIE_ARG \
            $JSON_ONLY_ARG
