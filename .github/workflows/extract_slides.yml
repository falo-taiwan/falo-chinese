name: Extract Slides from YouTube
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
      task_id:
        description: 'Task ID'
        required: true
      cloudflare_url:
        description: 'Cloudflare Worker URL'
        required: true

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools & Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install yt-dlp opencv-python-headless requests python-pptx pillow

      - name: Run Slide Extractor
        run: |
          python run_extractor.py \
            --url "${{ github.event.inputs.video_url }}" \
            --task-id "${{ github.event.inputs.task_id }}" \
            --cloudflare-url "${{ github.event.inputs.cloudflare_url }}"
